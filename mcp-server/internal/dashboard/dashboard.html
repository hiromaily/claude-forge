<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-forge dashboard</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0e1116;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
      --info: #a371f7;
      /* Status colour tokens — single source of truth.
         Badge text and left-border both derive from these, so they can never
         diverge. To change a status colour, edit exactly one line here. */
      --status-completed:      var(--ok);
      --status-in_progress:    var(--accent);
      --status-dispatched:     var(--info);
      --status-awaiting_human: var(--warn);
      --status-failed:         var(--bad);
      --status-revised:        var(--warn);
      --status-abandoned:      var(--muted);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --panel: #f6f8fa;
        --border: #d0d7de;
        --text: #1f2328;
        --muted: #636c76;
        --accent: #0969da;
        --ok: #1a7f37;
        --warn: #9a6700;
        --bad: #cf222e;
        --info: #8250df;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .badge.live::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .badge.disconnected::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--bad);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
    }
    select, button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    main {
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .event {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: baseline;
    }
    .event.kind-phase-start { border-left-color: var(--info); }
    .event.kind-phase-complete { border-left-color: var(--ok); }
    .event.kind-phase-fail { border-left-color: var(--bad); }
    .event.kind-checkpoint { border-left-color: var(--warn); }
    .event.kind-abandon { border-left-color: var(--bad); opacity: 0.7; }
    .event.kind-pipeline-init { border-left-color: var(--accent); }
    .event.kind-pipeline-complete { border-left-color: var(--ok); border-left-width: 5px; }
    .event.kind-agent-dispatch { border-left-color: var(--info); opacity: 0.85; }
    .event.kind-action-complete { border-left-color: var(--ok); opacity: 0.85; }
    .event.kind-revision-required { border-left-color: var(--warn); }
    /* Outcome-based border overrides: every outcome maps to its status token,
       so left-border always matches the badge text — no divergence possible.
       These run after the kind-* rules so they take precedence. */
    .event.outcome-completed      { border-left-color: var(--status-completed); }
    .event.outcome-in_progress    { border-left-color: var(--status-in_progress); }
    .event.outcome-dispatched     { border-left-color: var(--status-dispatched); }
    .event.outcome-awaiting_human { border-left-color: var(--status-awaiting_human); }
    .event.outcome-failed         { border-left-color: var(--status-failed); }
    .event.outcome-revised        { border-left-color: var(--status-revised); }
    .event.outcome-abandoned      { border-left-color: var(--status-abandoned); opacity: 0.7; }
    /* Outcome badge styles — background derives from the same status token as
       the text colour, so badge and border are always in sync. */
    .out-dispatched { background: color-mix(in srgb, var(--status-dispatched) 15%, transparent); color: var(--status-dispatched); }
    .out-revised    { background: color-mix(in srgb, var(--status-revised)    15%, transparent); color: var(--status-revised); }
    .event-kind {
      font-weight: 600;
      font-size: 13px;
    }
    .event-meta {
      color: var(--muted);
      font-size: 12px;
    }
    .event-time {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .event-spec {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .event-outcome {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .out-completed      { background: color-mix(in srgb, var(--status-completed)      15%, transparent); color: var(--status-completed); }
    .out-in_progress    { background: color-mix(in srgb, var(--status-in_progress)    15%, transparent); color: var(--status-in_progress); }
    .out-failed         { background: color-mix(in srgb, var(--status-failed)         15%, transparent); color: var(--status-failed); }
    .out-awaiting_human { background: color-mix(in srgb, var(--status-awaiting_human) 15%, transparent); color: var(--status-awaiting_human); }
    .out-abandoned      { background: color-mix(in srgb, var(--status-abandoned)      15%, transparent); color: var(--status-abandoned); }
    .action-btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      margin-left: 8px;
      vertical-align: baseline;
    }
    .action-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .action-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    .action-btn.warn:hover:not(:disabled) {
      background: var(--warn);
      border-color: var(--warn);
    }
    footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* ---- Artifact viewer ---- */
    .artifact-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
    }
    .artifact-overlay.open { display: flex; align-items: center; justify-content: center; }
    .artifact-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: min(90vw, 800px);
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .artifact-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .artifact-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }
    .artifact-close:hover { color: var(--text); }
    .artifact-body {
      overflow-y: auto;
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* ---- Checkpoint message ---- */
    .checkpoint-form {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      margin-top: 6px;
    }
    .checkpoint-input {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 28px;
      max-height: 120px;
    }
    .checkpoint-input::placeholder { color: var(--muted); }

    /* ---- View artifact button ---- */
    .view-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 11px;
      cursor: pointer;
      padding: 0 4px;
      text-decoration: underline;
    }
    .view-btn:hover { opacity: 0.8; }

    /* ---- Mobile optimisations ---- */
    @media (max-width: 640px) {
      header {
        padding: 12px 16px;
        gap: 8px;
      }
      .controls {
        margin-left: 0;
        width: 100%;
        flex-wrap: wrap;
      }
      .controls select {
        flex: 1;
        min-width: 0;
      }
      select, button {
        padding: 8px 12px;
        font-size: 14px;
      }
      main {
        padding: 12px;
      }
      .event {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 4px 8px;
        padding: 10px 12px;
      }
      .event-kind {
        grid-column: 1 / -1;
        font-size: 13px;
      }
      .event-meta {
        grid-column: 1;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .event-time {
        grid-column: 2;
        grid-row: 2;
        text-align: right;
        align-self: end;
      }
      .event-spec {
        font-size: 11px;
        word-break: break-all;
      }
      .empty {
        padding: 32px 16px;
      }
      footer {
        padding: 10px 16px;
        font-size: 11px;
      }
      .action-btn {
        padding: 6px 12px;
        font-size: 12px;
      }
      .artifact-panel {
        width: 95vw;
        max-height: 80vh;
      }
      .artifact-body {
        font-size: 12px;
        padding: 12px;
      }
      .checkpoint-form {
        flex-direction: column;
      }
      .checkpoint-input {
        font-size: 14px;
        padding: 8px;
      }
      .view-btn {
        font-size: 12px;
        padding: 4px 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>claude-forge</h1>
    <span id="status" class="badge disconnected">disconnected</span>
    <span id="event-count" class="badge">0 events</span>
    <div class="controls">
      <label for="ws-filter" class="badge" style="border:none;">workspace</label>
      <select id="ws-filter">
        <option value="">all workspaces</option>
      </select>
      <span id="ws-status" class="badge" style="display:none;"></span>
      <button id="remove-finished-btn" class="action-btn" type="button" disabled
              title="Hide completed/abandoned workspaces from the list">hide finished</button>
      <button id="abandon-btn" class="action-btn danger" type="button" disabled
              title="Select a workspace to enable abandon">abandon</button>
    </div>
  </header>
  <main>
    <div id="empty" class="empty">
      Waiting for pipeline events…<br>
      <small>Run <code>/forge &lt;task&gt;</code> in Claude Code to see phase transitions appear here in real time.</small>
    </div>
    <div id="timeline" class="timeline"></div>
  </main>
  <footer>
    Server-Sent Events from <code>/events</code>. Reconnects automatically on drop. Events are persisted to <code>events.jsonl</code>; reloads replay full history.
  </footer>

  <!-- Artifact viewer overlay -->
  <div id="artifact-overlay" class="artifact-overlay">
    <div class="artifact-panel">
      <div class="artifact-header">
        <span id="artifact-title">artifact</span>
        <button id="artifact-close" class="artifact-close" type="button">&times;</button>
      </div>
      <div id="artifact-body" class="artifact-body"></div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var statusEl = document.getElementById("status");
      var countEl = document.getElementById("event-count");
      var emptyEl = document.getElementById("empty");
      var timelineEl = document.getElementById("timeline");
      var wsFilter = document.getElementById("ws-filter");
      var wsStatusEl = document.getElementById("ws-status");
      var removeFinishedBtn = document.getElementById("remove-finished-btn");
      var abandonBtn = document.getElementById("abandon-btn");

      var es = null;
      var count = 0;
      var workspaces = new Set();
      var hiddenWorkspaces = new Set();  // workspaces hidden by "hide finished"

      // Phase ID → human-readable label map, fetched from /api/phase-labels.
      // Resolved client-side to keep the event publishing path decoupled from
      // the orchestrator package.
      var artifactOverlay = document.getElementById("artifact-overlay");
      var artifactTitle = document.getElementById("artifact-title");
      var artifactBody = document.getElementById("artifact-body");
      var artifactCloseBtn = document.getElementById("artifact-close");

      var phaseLabels = {};
      fetch("/api/phase-labels")
        .then(function (r) { return r.json(); })
        .then(function (m) { phaseLabels = m || {}; })
        .catch(function () { /* best-effort; labels degrade to raw IDs */ });

      // Phase ID → artifact filename map.
      var phaseArtifacts = {};
      fetch("/api/phase-artifacts")
        .then(function (r) { return r.json(); })
        .then(function (m) { phaseArtifacts = m || {}; })
        .catch(function () { /* best-effort */ });

      // Maximum number of event rows kept in the DOM. Older rows are dropped
      // from the bottom of the timeline once this cap is reached, so a
      // long-running pipeline does not grow the DOM without bound.
      var MAX_TIMELINE_ROWS = 500;

      // Allowlist of CSS class fragments derivable from server data.
      // Anything outside the allowlist falls back to a generic "unknown"
      // class so the data path can never inject arbitrary CSS class names.
      var KNOWN_EVENTS = ["phase-start", "phase-complete", "phase-fail", "checkpoint", "abandon",
        "pipeline-init", "pipeline-complete", "agent-dispatch", "action-complete", "revision-required"];
      var KNOWN_OUTCOMES = ["completed", "in_progress", "failed", "revised", "awaiting_human", "abandoned", "dispatched"];

      function safeClassFragment(value, allowlist, fallback) {
        return allowlist.indexOf(value) === -1 ? fallback : value;
      }

      // postIntervention POSTs JSON to a same-origin intervention endpoint
      // and resolves with { ok, status, data }. Network failures reject.
      //
      // A 10-second AbortController guards against a hung server keeping the
      // UI button in its loading state forever. The intervention endpoints
      // only update state.json, so 10s is generous; an aborted request
      // surfaces as a normal catch() with err.name === "AbortError".
      var INTERVENTION_TIMEOUT_MS = 10_000;

      function postIntervention(path, body) {
        var ctrl = new AbortController();
        var timer = setTimeout(function () { ctrl.abort(); }, INTERVENTION_TIMEOUT_MS);
        return fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal: ctrl.signal
        }).then(function (resp) {
          return resp.json().then(
            function (data) { return { ok: resp.ok, status: resp.status, data: data }; },
            function () { return { ok: resp.ok, status: resp.status, data: {} }; }
          );
        }).finally(function () {
          clearTimeout(timer);
        });
      }

      function approveCheckpoint(workspace, phase, btn, messageInput) {
        var message = messageInput ? messageInput.value.trim() : "";
        btn.disabled = true;
        btn.textContent = "approving…";
        postIntervention("/api/checkpoint/approve", { workspace: workspace, phase: phase, message: message })
          .then(function (r) {
            if (r.ok) {
              btn.textContent = "✓ Pipeline will continue automatically";
              if (messageInput) messageInput.disabled = true;
            } else {
              btn.disabled = false;
              btn.textContent = "approve";
              alert("Approve failed: " + ((r.data && r.data.error) || ("HTTP " + r.status)));
            }
          })
          .catch(function (err) {
            btn.disabled = false;
            btn.textContent = "approve";
            alert("Network error: " + err.message);
          });
      }

      function openArtifact(workspace, file) {
        artifactTitle.textContent = file;
        artifactBody.textContent = "Loading…";
        artifactOverlay.classList.add("open");
        fetch("/api/artifact?workspace=" + encodeURIComponent(workspace) + "&file=" + encodeURIComponent(file))
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.text();
          })
          .then(function (text) { artifactBody.textContent = text; })
          .catch(function (err) { artifactBody.textContent = "Error: " + err.message; });
      }

      artifactCloseBtn.addEventListener("click", function () {
        artifactOverlay.classList.remove("open");
      });
      artifactOverlay.addEventListener("click", function (e) {
        if (e.target === artifactOverlay) artifactOverlay.classList.remove("open");
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && artifactOverlay.classList.contains("open")) {
          artifactOverlay.classList.remove("open");
        }
      });

      // Track the latest status per workspace from SSE events.
      var TERMINAL_STATUSES = ["completed", "abandoned", "failed"];
      var wsStatuses = {};  // workspace → latest outcome string

      function updateWorkspaceStatus(ws, outcome) {
        if (ws && outcome) wsStatuses[ws] = outcome;
      }

      function syncWorkspaceStatusBadge() {
        var ws = wsFilter.value;
        if (!ws || !wsStatuses[ws]) {
          wsStatusEl.style.display = "none";
          return;
        }
        var status = wsStatuses[ws];
        wsStatusEl.textContent = status;
        wsStatusEl.className = "badge";
        wsStatusEl.style.display = "";
        // Apply colour matching the outcome badge styles
        var colorVar = "--status-" + status.replace(/ /g, "_");
        wsStatusEl.style.color = "var(" + colorVar + ")";
        wsStatusEl.style.borderColor = "var(" + colorVar + ")";
      }

      function syncRemoveFinishedButton() {
        var hasFinished = false;
        workspaces.forEach(function (ws) {
          if (TERMINAL_STATUSES.indexOf(wsStatuses[ws]) !== -1) hasFinished = true;
        });
        removeFinishedBtn.disabled = !hasFinished;
      }

      function syncAbandonButton() {
        var ws = wsFilter.value;
        var active = ws && TERMINAL_STATUSES.indexOf(wsStatuses[ws]) === -1;
        abandonBtn.disabled = !active;
        abandonBtn.title = active
          ? "Abandon pipeline for " + (shortWorkspace(ws) || ws)
          : "Select an active workspace to enable abandon";
      }

      function abandonPipeline() {
        var ws = wsFilter.value;
        if (!ws) return;
        if (!confirm("Abandon pipeline for " + (shortWorkspace(ws) || ws) + "?\nThis cannot be undone.")) return;
        abandonBtn.disabled = true;
        postIntervention("/api/pipeline/abandon", { workspace: ws })
          .then(function (r) {
            if (r.ok) {
              alert("Pipeline abandoned.");
            } else {
              alert("Abandon failed: " + ((r.data && r.data.error) || ("HTTP " + r.status)));
            }
          })
          .catch(function (err) {
            alert("Network error: " + err.message);
          })
          .then(syncAbandonButton);
      }

      function removeFinishedWorkspaces() {
        workspaces.forEach(function (ws) {
          if (TERMINAL_STATUSES.indexOf(wsStatuses[ws]) !== -1) {
            hiddenWorkspaces.add(ws);
            workspaces.delete(ws);
          }
        });
        var current = wsFilter.value;
        refreshWorkspaceOptions();
        // Always reset the timeline: hidden workspace events must be purged,
        // including when "all workspaces" is selected.
        resetTimeline();
        // If the selected workspace was hidden, reset filter to "all".
        if (current && hiddenWorkspaces.has(current)) wsFilter.value = "";
        // Reconnect so the replayed event stream is filtered by renderEvent.
        connect();
        syncWorkspaceStatusBadge();
        syncRemoveFinishedButton();
        syncAbandonButton();
      }

      function setStatus(connected) {
        if (connected) {
          statusEl.textContent = "live";
          statusEl.className = "badge live";
        } else {
          statusEl.textContent = "disconnected";
          statusEl.className = "badge disconnected";
        }
      }

      function fmtTime(iso) {
        if (!iso) return "";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function shortWorkspace(ws) {
        if (!ws) return "";
        var parts = ws.split("/");
        return parts.slice(-2).join("/");
      }

      function refreshWorkspaceOptions() {
        var current = wsFilter.value;
        // Remove all options except the first ("all").
        while (wsFilter.options.length > 1) wsFilter.remove(1);
        Array.from(workspaces).sort().forEach(function (ws) {
          var opt = document.createElement("option");
          opt.value = ws;
          opt.textContent = shortWorkspace(ws);
          wsFilter.appendChild(opt);
        });
        if (current && workspaces.has(current)) wsFilter.value = current;
      }

      function renderEvent(ev) {
        if (ev.workspace) {
          // Skip events for workspaces the user has chosen to hide.
          if (hiddenWorkspaces.has(ev.workspace)) return;
          if (!workspaces.has(ev.workspace)) {
            workspaces.add(ev.workspace);
            refreshWorkspaceOptions();
          }
          if (ev.outcome) {
            updateWorkspaceStatus(ev.workspace, ev.outcome);
            syncWorkspaceStatusBadge();
            syncRemoveFinishedButton();
            syncAbandonButton();
          }
        }

        var div = document.createElement("div");
        var cls = "event kind-" + safeClassFragment(ev.event, KNOWN_EVENTS, "unknown");
        if (ev.outcome) {
          cls += " outcome-" + safeClassFragment(ev.outcome, KNOWN_OUTCOMES, "unknown");
        }
        div.className = cls;

        var kind = document.createElement("div");
        kind.className = "event-kind";
        kind.textContent = ev.event || "(unknown)";
        if (ev.phase) {
          var phaseSpan = document.createElement("span");
          phaseSpan.className = "event-meta";
          var phaseText = ev.phase;
          var label = phaseLabels[ev.phase];
          if (label) {
            phaseText += ": " + label;
          }
          phaseSpan.textContent = " · " + phaseText;
          kind.appendChild(phaseSpan);
        }

        var meta = document.createElement("div");
        meta.className = "event-meta";
        var spec = document.createElement("span");
        spec.className = "event-spec";
        spec.textContent = ev.specName || shortWorkspace(ev.workspace) || "(no spec)";
        meta.appendChild(spec);
        if (ev.outcome) {
          meta.appendChild(document.createTextNode(" "));
          var out = document.createElement("span");
          out.className = "event-outcome out-" + safeClassFragment(ev.outcome, KNOWN_OUTCOMES, "unknown");
          out.textContent = ev.outcome;
          meta.appendChild(out);
        }
        if (ev.detail) {
          meta.appendChild(document.createTextNode(" "));
          var detail = document.createElement("span");
          detail.className = "event-meta";
          detail.textContent = ev.detail;
          meta.appendChild(detail);
        }

        // Artifact view links: shown on phase-complete events when the phase
        // has known artifact files. Allows viewing the generated document.
        if (ev.event === "phase-complete" && ev.workspace && ev.phase) {
          var artifacts = phaseArtifacts[ev.phase];
          if (artifacts && artifacts.length > 0) {
            artifacts.forEach(function (file) {
              var viewBtn = document.createElement("button");
              viewBtn.type = "button";
              viewBtn.className = "view-btn";
              viewBtn.textContent = file;
              viewBtn.addEventListener("click", function () {
                openArtifact(ev.workspace, file);
              });
              meta.appendChild(viewBtn);
            });
          }
        }

        // Inline Approve button with optional message input: shown only on a
        // checkpoint event that is currently awaiting human input.
        if (ev.event === "checkpoint" && ev.outcome === "awaiting_human" && ev.workspace && ev.phase) {
          // Show links to relevant artifacts for review before approving.
          // NOTE: This map duplicates knowledge from the server-side phaseArtifacts
          // in artifact.go. When adding phases or artifacts, update both locations.
          var checkpointArtifactMap = {
            "checkpoint-a": ["analysis.md", "investigation.md", "design.md", "review-design.md"],
            "checkpoint-b": ["tasks.md", "review-tasks.md"]
          };
          var relatedArtifacts = checkpointArtifactMap[ev.phase] || [];
          if (relatedArtifacts.length > 0) {
            relatedArtifacts.forEach(function (file) {
              var viewBtn = document.createElement("button");
              viewBtn.type = "button";
              viewBtn.className = "view-btn";
              viewBtn.textContent = file;
              viewBtn.addEventListener("click", function () {
                openArtifact(ev.workspace, file);
              });
              meta.appendChild(viewBtn);
            });
          }

          // Checkpoint form: message input + approve button
          var form = document.createElement("div");
          form.className = "checkpoint-form";

          var msgInput = document.createElement("textarea");
          msgInput.className = "checkpoint-input";
          msgInput.placeholder = "Instructions for AI (optional)…";
          msgInput.rows = 1;

          var approveBtn = document.createElement("button");
          approveBtn.type = "button";
          approveBtn.className = "action-btn";
          approveBtn.textContent = "approve";
          approveBtn.addEventListener("click", function () {
            approveCheckpoint(ev.workspace, ev.phase, approveBtn, msgInput);
          });

          form.appendChild(msgInput);
          form.appendChild(approveBtn);
          meta.appendChild(form);
        }

        var time = document.createElement("div");
        time.className = "event-time";
        time.textContent = fmtTime(ev.timestamp);
        time.title = ev.timestamp || "";

        div.appendChild(kind);
        div.appendChild(meta);
        div.appendChild(time);

        timelineEl.insertBefore(div, timelineEl.firstChild);
        emptyEl.style.display = "none";
        count++;
        countEl.textContent = count + " event" + (count === 1 ? "" : "s");

        // Cap the visible timeline so the DOM does not grow without bound on
        // long-running pipelines. Older rows are removed from the bottom; the
        // cumulative event counter keeps tracking the true total.
        while (timelineEl.childElementCount > MAX_TIMELINE_ROWS) {
          timelineEl.removeChild(timelineEl.lastElementChild);
        }
      }

      function resetTimeline() {
        timelineEl.innerHTML = "";
        count = 0;
        countEl.textContent = "0 events";
        emptyEl.style.display = "";
      }

      function connect() {
        if (es) {
          es.close();
          es = null;
        }
        var url = "/events";
        var ws = wsFilter.value;
        if (ws) url += "?workspace=" + encodeURIComponent(ws);
        es = new EventSource(url);
        es.onopen = function () { setStatus(true); };
        es.onerror = function () { setStatus(false); };
        es.onmessage = function (e) {
          try {
            var ev = JSON.parse(e.data);
            renderEvent(ev);
          } catch (err) {
            console.error("dashboard: failed to parse event", err, e.data);
          }
        };
      }

      wsFilter.addEventListener("change", function () {
        // The previous timeline reflects a different filter; clear it so the
        // user does not see stale events from another workspace mixed with the
        // newly-filtered stream.
        resetTimeline();
        connect();
        syncWorkspaceStatusBadge();
        syncAbandonButton();
      });
      removeFinishedBtn.addEventListener("click", removeFinishedWorkspaces);
      abandonBtn.addEventListener("click", abandonPipeline);

      syncWorkspaceStatusBadge();
      syncAbandonButton();
      connect();
    })();
  </script>
</body>
</html>
