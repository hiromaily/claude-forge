pre-commit:
  parallel: false
  commands:
    go-fmt:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-fmt
      stage_fixed: true
    go-lint-fast:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-lint-fast
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    go-lint:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-lint
    hook-tests:
      glob: "scripts/*.sh"
      run: bash scripts/test-hooks.sh
