pre-commit:
  parallel: false
  commands:
    go-fmt:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-fmt
      stage_fixed: true
    go-lint-fast:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-lint-fast
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    go-lint:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-lint
    go-test:
      root: "mcp-server"
      glob: "**/*.go"
      run: make go-test
    hook-tests:
      glob: "scripts/*.sh"
      run: bash scripts/test-hooks.sh
    docs-check:
      glob: "{template/**/*.md,docsgen.yaml}"
      run: |
        make docs
        if ! git diff --quiet README.md CLAUDE.md ARCHITECTURE.md SETUP.md .claude/ template/INDEX.md; then
          echo "ERROR: Generated files are out of date. Run 'make docs' and commit the changes." >&2
          exit 1
        fi
